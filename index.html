<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASAKA AR</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #202020;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #202020;
    }

    #ar-button {
      background: white;
      border-radius: 8px;
      border: none;
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<model-viewer
  src="ASAKA_BL.glb"
  alt="ASAKA"
  camera-controls
  auto-rotate
  autoplay

  ar
  ar-modes="scene-viewer webxr quick-look"

  shadow-intensity="1"
  environment-image="neutral">

  <button slot="ar-button" id="ar-button">
    View in AR
  </button>

</model-viewer>

</body>
</html>
