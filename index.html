<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASAKA AR</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --progress-bar-color: #00c8ff;
      background-color: #000;
    }
  </style>
</head>

<body>

<model-viewer
    src="ASAKA_BL.glb"
    alt="ASAKA"
    camera-controls
    auto-rotate
    autoplay

    animation-name="*"

    ar
    ar-modes="scene-viewer webxr quick-look"

    shadow-intensity="1"
    environment-image="neutral">

</model-viewer>

</body>
</html>
