<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GeoMorph Specimen - ASAKA</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:Arial,Helvetica,sans-serif;
}

model-viewer{
    width:100%;
    height:100%;
    background:#111;
}

#title{

    position:absolute;

    top:20px;
    left:20px;

    color:white;

    background:rgba(0,0,0,.55);

    padding:18px;

    border-radius:12px;

    z-index:100;

    backdrop-filter:blur(10px);

}

#title h1{

    margin:0;
    font-size:28px;

}

#title h2{

    margin:4px 0 0 0;

    font-size:16px;

    color:#6fd9ff;

    font-weight:normal;

}

#title p{

    margin-top:10px;

    color:#ddd;

    font-size:14px;

    line-height:1.5em;

}

#ar-button{

    background:#009dff;

    color:white;

    border:none;

    border-radius:10px;

    padding:14px 28px;

    font-size:18px;

    cursor:pointer;

    position:absolute;

    left:50%;

    transform:translateX(-50%);

    bottom:35px;

    box-shadow:0 8px 25px rgba(0,0,0,.4);

}

#ar-button:hover{

    background:#1ab5ff;

}

</style>

</head>

<body>

<div id="title">

<h1>ASAKA</h1>

<h2>AquaMorph Specimen</h2>

<p>

Parametric Structural Lifeform<br>

Morph Animation / WebAR

</p>

</div>

<model-viewer

src="ASAKA_BL.glb"

alt="ASAKA"

camera-controls

auto-rotate

autoplay

interaction-prompt="auto"

shadow-intensity="1"

environment-image="neutral"

ar

ar-modes="scene-viewer webxr quick-look"

>

<button slot="ar-button" id="ar-button">

🧬 View in AR

</button>

</model-viewer>

</body>

</html>
